<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Tier List Maker</title>
    <style>
        /* TierMaker Palette & Typography */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* The Container */
        #tier-container {
            width: 100%;
            max-width: 1000px;
            background-color: #000;
            border: 1px solid #333;
        }

        /* Individual Rows */
        .tier-row {
            display: flex;
            min-height: 80px;
            border-bottom: 1px solid #111;
            transition: all 0.2s;
        }

        /* The Label (S, A, B, etc.) */
        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            min-width: 80px;
            font-weight: bold;
            font-size: 24px;
            color: #000;
            text-align: center;
            border-right: 1px solid #111;
        }

        /* Tier Colors */
        .s-label { background-color: #ff7f7f; }
        .a-label { background-color: #ffbf7f; }
        .b-label { background-color: #ffff7f; }
        .c-label { background-color: #7fff7f; }
        .d-label { background-color: #7fbfff; }
        .f-label { background-color: #ff7fff; }

        /* The Slot where images go */
        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 5px;
            flex-grow: 1;
            min-height: 80px;
        }

        /* Meal Image Styling */
        .meal-card {
            width: 70px;
            height: 70px;
            margin: 5px;
            cursor: pointer;
            object-fit: cover;
            border: 1px solid #444;
            transition: transform 0.1s;
        }

        .meal-card:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        /* Modal / Popup Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            background-color: #222;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #444;
            width: 80%;
            max-width: 500px;
            text-align: center;
            border-radius: 8px;
        }

        #modalImg {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .close-btn {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S-tier"><div class="label s-label">S</div><div class="content"></div></div>
        <div class="tier-row" id="A-tier"><div class="label a-label">A</div><div class="content"></div></div>
        <div class="tier-row" id="B-tier"><div class="label b-label">B</div><div class="content"></div></div>
        <div class="tier-row" id="C-tier"><div class="label c-label">C</div><div class="content"></div></div>
        <div class="tier-row" id="D-tier"><div class="label d-label">D</div><div class="content"></div></div>
        <div class="tier-row" id="F-tier"><div class="label f-label">F</div><div class="content"></div></div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <img id="modalImg" src="">
            <p id="modalScore" style="font-size: 1.2em; color: #ffbf7f;"></p>
            <p id="modalComment" style="font-style: italic; color: #ccc;"></p>
        </div>
    </div>

    <script>
        // DATA: Your friends can easily edit this section
        const mealData = [
            { name: "Spicy Ramen", taste: 10, texture: 8, ease: 7, img: "https://via.placeholder.com/150/ff7f7f", comment: "Perfect for rainy days." },
            { name: "Frozen Pizza", taste: 5, texture: 4, ease: 10, img: "https://via.placeholder.com/150/7fbfff", comment: "Low effort, low reward." },
            { name: "Steak", taste: 9, texture: 10, ease: 4, img: "https://via.placeholder.com/150/ffbf7f", comment: "A masterpiece if done right." }
        ];

        function calculateTier(meal) {
            const score = (meal.taste * 2 + meal.texture + meal.ease) / 4;
            if (score >= 9) return "S-tier";
            if (score >= 7.5) return "A-tier";
            if (score >= 6) return "B-tier";
            if (score >= 4.5) return "C-tier";
            if (score >= 3) return "D-tier";
            return "F-tier";
        }

        function renderList() {
            mealData.forEach(meal => {
                const tierId = calculateTier(meal);
                const row = document.getElementById(tierId).querySelector('.content');
                
                const img = document.createElement('img');
                img.src = meal.img;
                img.className = "meal-card";
                img.title = meal.name; // Shows name on hover
                img.onclick = () => showModal(meal);
                
                row.appendChild(img);
            });
        }

        function showModal(meal) {
            const score = (meal.taste * 2 + meal.texture + meal.ease) / 4;
            document.getElementById('modalTitle').innerText = meal.name;
            document.getElementById('modalImg').src = meal.img;
            document.getElementById('modalScore').innerText = `Final Score: ${score.toFixed(1)}/10`;
            document.getElementById('modalComment').innerText = `"${meal.comment}"`;
            document.getElementById('infoModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = "none";
        }

        // Close modal if clicking outside of it
        window.onclick = (event) => {
