<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meal Tier List</title>
    <style>
        /* TIERMAKER STYLING */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        #tier-container {
            width: 100%;
            max-width: 950px;
            background-color: #000;
            border: 1px solid #333;
            margin-bottom: 40px;
        }

        .tier-row {
            display: flex;
            min-height: 100px;
            border-bottom: 1px solid #111;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            min-width: 100px;
            font-weight: bold;
            font-size: 30px;
            color: #111;
        }

        /* Tiers */
        .s { background: #ff7f7f; } .a { background: #ffbf7f; }
        .b { background: #ffff7f; } .c { background: #7fff7f; }
        .d { background: #7fbfff; } .f { background: #ff7fff; }

        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            flex-grow: 1;
            gap: 10px;
        }

        .meal-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .meal-img:hover { border-color: white; transform: scale(1.1); }

        /* FORM STYLING */
        .admin-panel {
            background: #252525;
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #444;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button { background: #ff7f7f; color: black; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #ffbf7f; }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #333;
        }

        #modal-image { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .del-btn { background: #ff4444; color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S"><div class="label s">S</div><div class="content"></div></div>
        <div class="tier-row" id="A"><div class="label a">A</div><div class="content"></div></div>
        <div class="tier-row" id="B"><div class="label b">B</div><div class="content"></div></div>
        <div class="tier-row" id="C"><div class="label c">C</div><div class="content"></div></div>
        <div class="tier-row" id="D"><div class="label d">D</div><div class="content"></div></div>
        <div class="tier-row" id="F"><div class="label f">F</div><div class="content"></div></div>
    </div>

    <div class="admin-panel">
        <h3>Add New Entry</h3>
        <form id="meal-form">
            <input type="text" id="food-name" placeholder="Food Name" required>
            <input type="text" id="food-url" placeholder="Image Path (e.g. images/pizza.jpg)" required>
            <div style="display:flex; gap:5px;">
                <input type="number" id="t-score" placeholder="Taste" min="1" max="10" required>
                <input type="number" id="tx-score" placeholder="Texture" min="1" max="10" required>
                <input type="number" id="e-score" placeholder="Ease" min="1" max="10" required>
            </div>
            <textarea id="food-comment" placeholder="Thoughts..."></textarea>
            <button type="submit">Save to Cloud</button>
        </form>
    </div>

    <div id="detailModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-image" src="">
            <h2 id="modal-name"></h2>
            <p id="modal-rank" style="font-weight:bold; font-size: 24px;"></p>
            <p id="modal-score" style="color: #aaa;"></p>
            <p id="modal-comment" style="font-style: italic; background:#222; padding:10px; border-radius:5px;"></p>
            <button class="del-btn" id="delete-btn">Delete Entry</button>
        </div>
    </div>
