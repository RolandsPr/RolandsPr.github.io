<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meal Tier List</title>
    <style>
        /* TIERMAKER DESIGN SYSTEM */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        #tier-container {
            width: 100%;
            max-width: 950px;
            background-color: #000;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .tier-row {
            display: flex;
            min-height: 100px;
            border-bottom: 1px solid #111;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            min-width: 100px;
            font-weight: bold;
            font-size: 32px;
            color: #111;
        }

        /* Tier Colors */
        .s { background: #ff7f7f; } .a { background: #ffbf7f; }
        .b { background: #ffff7f; } .c { background: #7fff7f; }
        .d { background: #7fbfff; } .f { background: #ff7fff; }

        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            flex-grow: 1;
            gap: 10px;
            align-content: flex-start;
        }

        .meal-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.15s ease-in-out;
            background: #222;
        }

        .meal-img:hover { border-color: white; transform: scale(1.1); z-index: 5; }

        /* ADMIN PANEL */
        .admin-panel {
            background: #252525;
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #444;
            margin-bottom: 50px;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button { background: #ff7f7f; color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ffbf7f; transform: translateY(-2px); }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #333;
        }

        #modal-image { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .del-btn { background: #ff4444; color: white; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S"><div class="label s">S</div><div class="content"></div></div>
        <div class="tier-row" id="A"><div class="label a">A</div><div class="content"></div></div>
        <div class="tier-row" id="B"><div class="label b">B</div><div class="content"></div></div>
        <div class="tier-row" id="C"><div class="label c">C</div><div class="content"></div></div>
        <div class="tier-row" id="D"><div class="label d">D</div><div class="content"></div></div>
        <div class="tier-row" id="F"><div class="label f">F</div><div class="content"></div></div>
    </div>

    <div class="admin-panel">
        <h3>Add New Entry</h3>
        <p style="font-size: 12px; color: #888; margin-top: -10px;">Data syncs live via Firebase</p>
        <form id="meal-form">
            <input type="text" id="food-name" placeholder="Food Name" required>
            <input type="text" id="food-url" placeholder="Image Path (e.g., images/burger.jpg)" required>
            <div style="display:flex; gap:5px;">
                <input type="number" id="t-score" placeholder="Taste" min="1" max="10" required title="Taste (1-10)">
                <input type="number" id="tx-score" placeholder="Texture" min="1" max="10" required title="Texture (1-10)">
                <input type="number" id="e-score" placeholder="Ease" min="1" max="10" required title="Ease (1-10)">
            </div>
            <textarea id="food-comment" placeholder="Add your review..."></textarea>
            <button type="submit">Save to Cloud</button>
        </form>
    </div>

    <div id="detailModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-image" src="">
            <h2 id="modal-name" style="margin-bottom:5px;"></h2>
            <div id="modal-rank" style="font-size: 28px; font-weight: bold; margin-bottom: 10px;"></div>
            <p id="modal-score" style="color: #888; margin-bottom: 15px;"></p>
            <p id="modal-comment" style="font-style: italic; background:#222; padding:15px; border-radius:8px; line-height: 1.4;"></p>
            <button class="del-btn" id="delete-btn">Delete Entry for Everyone</button>
            <button onclick="document.getElementById('detailModal').style.display='none'" style="background:none; color:#555; font-size:12px; text-decoration:underline;">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 2. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD2GB1z8EtrLOab0qT_yUgkyKkGrGRTD3Y",
            authDomain: "food-tier-list-faa87.firebaseapp.com",
            databaseURL: "https://food-tier-list-faa87-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "food-tier-list-faa87",
            storageBucket: "food-tier-list-faa87.firebasestorage.app",
            messagingSenderId: "14181086909",
            appId: "1:14181086909:web:36deb605a6ef77c64069d4",
            measurementId: "G-JCGXWM0VB5"
        };
const IMGBB_API_KEY = d0585a9282e603bcf0ecbdf5beca45a5;

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('meals');
let currentMealId = null;

// === LOAD DATA ===
db.on('value', (snap) => {
    document.querySelectorAll('.content').forEach(c => c.innerHTML = '');
    const data = snap.val();
    if (data) Object.keys(data).forEach(id => renderMeal(data[id], id));
});

// === UPLOAD TO IMGBB & SAVE TO FIREBASE ===
document.getElementById('meal-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    const fileInput = document.getElementById('file');
    const file = fileInput.files[0];
    
    if (!file) return alert("Please select an image!");

    btn.disabled = true;
    btn.innerText = "Uploading Image...";

    try {
        // 1. Prepare the image for ImgBB
        const formData = new FormData();
        formData.append('image', file);

        // 2. Upload to ImgBB API
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
        });

        const result = await response.json();
        
        if (!result.success) throw new Error("ImgBB upload failed");

        const directLink = result.data.url; // This is your permanent image link

        // 3. Save the meal data to Firebase
        const meal = {
            name: document.getElementById('name').value,
            url: directLink,
            taste: parseFloat(document.getElementById('t').value),
            texture: parseFloat(document.getElementById('tx').value),
            ease: parseFloat(document.getElementById('e').value),
            comment: document.getElementById('comm').value
        };

        await db.push(meal);
        
        e.target.reset();
        alert("Success! Meal added to the list.");

    } catch (error) {
        console.error(error);
        alert("Upload failed. Check your API key or internet connection.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Upload & Save";
    }
});
    </script>
</body>
</html>
