<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Tier List | GitHub Edition</title>
    <style>
        /* TIERMAKER DESIGN SYSTEM */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* THE GRID */
        #tier-container {
            width: 100%;
            max-width: 950px;
            background-color: #000;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .tier-row {
            display: flex;
            min-height: 100px;
            border-bottom: 1px solid #222;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            min-width: 100px;
            font-weight: bold;
            font-size: 32px;
            color: #111;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2);
        }

        /* ROW COLORS */
        .s { background: #ff7f7f; }
        .a { background: #ffbf7f; }
        .b { background: #ffff7f; }
        .c { background: #7fff7f; }
        .d { background: #7fbfff; }
        .f { background: #ff7fff; }

        /* DYNAMIC CONTENT AREA */
        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            flex-grow: 1;
            gap: 10px;
            align-content: flex-start;
        }

        .meal-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.15s ease-in-out;
            background: #222;
        }

        .meal-img:hover { border-color: white; transform: scale(1.1); z-index: 5; }

        /* INPUT FORM SECTION */
        .admin-section {
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
            background: #252525;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .form-group { display: flex; flex-direction: column; gap: 10px; }
        
        input, textarea {
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            font-size: 14px;
        }

        .score-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        button {
            padding: 12px;
            background: #ff7f7f;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover { background: #ffbf7f; transform: translateY(-2px); }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            border: 2px solid #333;
        }

        #modal-image { width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* GITHUB CODE OUTPUT */
        #output-box {
            display: none;
            margin-top: 20px;
            background: #000;
            padding: 15px;
            border: 1px dashed #7fff7f;
            color: #7fff7f;
            font-family: monospace;
            font-size: 12px;
            position: relative;
        }

        .copy-hint { color: #aaa; font-size: 12px; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S"><div class="label s">S</div><div class="content"></div></div>
        <div class="tier-row" id="A"><div class="label a">A</div><div class="content"></div></div>
        <div class="tier-row" id="B"><div class="label b">B</div><div class="content"></div></div>
        <div class="tier-row" id="C"><div class="label c">C</div><div class="content"></div></div>
        <div class="tier-row" id="D"><div class="label d">D</div><div class="content"></div></div>
        <div class="tier-row" id="F"><div class="label f">F</div><div class="content"></div></div>
    </div>

    <div class="admin-section">
        <h3>Add New Meal Entry</h3>
        <form id="meal-form" class="form-group">
            <input type="text" id="name" placeholder="Food Name" required>
            <input type="url" id="url" placeholder="Image URL (Right click image -> Copy Image Address)" required>
            <div class="score-row">
                <input type="number" id="taste" placeholder="Taste (1-10)" min="1" max="10" required>
                <input type="number" id="texture" placeholder="Texture (1-10)" min="1" max="10" required>
                <input type="number" id="ease" placeholder="Ease (1-10)" min="1" max="10" required>
            </div>
            <textarea id="comment" placeholder="Any comments or spicy takes?"></textarea>
            <button type="submit">Preview on List</button>
        </form>

        <div id="output-box">
            <p style="margin-top:0; color:white;">👇 Copy this code to meals.js on GitHub:</p>
            <pre id="code-result"></pre>
            <button onclick="copyCode()" style="width:100%; font-size:12px; background:#444; color:white;">Copy Snippet</button>
        </div>
        <p class="copy-hint">Note: Previewing adds it locally. To make it permanent for everyone, the code snippet must be added to the shared file.</p>
    </div>

    <div id="mealModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-image" src="">
            <h2 id="modal-name" style="margin:10px 0;"></h2>
            <div id="modal-rank" style="font-size: 24px; font-weight: bold; margin-bottom: 10px;"></div>
            <p id="modal-score" style="color: #888; margin-bottom: 15px;"></p>
            <p id="modal-comment" style="font-style: italic; line-height: 1.5; background: #252525; padding: 15px; border-radius: 8px;"></p>
            <button onclick="document.getElementById('mealModal').style.display='none'" style="margin-top:20px; width:100%;">Close</button>
        </div>
    </div>

    <script src="meals.js"></script>

    <script>
        // 1. LOAD DATA FROM meals.js
        window.onload = () => {
            if (typeof sharedMeals !== 'undefined') {
                sharedMeals.forEach(meal => renderMeal(meal));
            }
        };

        // 2. FORM SUBMISSION (LOCAL PREVIEW + CODE GENERATION)
        const mealForm = document.getElementById('meal-form');
        mealForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const meal = {
                name: document.getElementById('name').value,
                url: document.getElementById('url').value,
                taste: parseFloat(document.getElementById('taste').value),
                texture: parseFloat(document.getElementById('texture').value),
                ease: parseFloat(document.getElementById('ease').value),
                comment: document.getElementById('comment').value
            };

            // Add to the visual list immediately for the user
            renderMeal(meal);

            // Generate the snippet for GitHub
            const snippet = `    ,{
        name: "${meal.name}",
        url: "${meal.url}",
        taste: ${meal.taste},
        texture: ${meal.texture},
        ease: ${meal.ease},
        comment: "${meal.comment}"
    }`;
            
            document.getElementById('code-result').innerText = snippet;
            document.getElementById('output-box').style.display = 'block';
            mealForm.reset();
        });

        // 3. RENDER LOGIC (THE BRAINS)
        function renderMeal(meal) {
            const finalScore = (meal.taste * 2 + meal.texture + meal.ease) / 4;
            let tier = 'F';
            if (finalScore >= 9) tier = 'S';
            else if (finalScore >= 7.5) tier = 'A';
            else if (finalScore >= 6) tier = 'B';
            else if (finalScore >= 4.5) tier = 'C';
            else if (finalScore >= 3) tier = 'D';

            const row = document.getElementById(tier).querySelector('.content');
            
            const img = document.createElement('img');
            img.src = meal.url;
            img.className = 'meal-img';
            img.title = meal.name;
            img.onclick = () => openModal(meal, tier, finalScore);
            
            row.appendChild(img);
        }

        // 4. MODAL LOGIC
        function openModal(meal, tier, score) {
            document.getElementById('modal-image').src = meal.url;
            document.getElementById('modal-name').innerText = meal.name;
            document.getElementById('modal-rank').innerText = tier + " RANK";
            document.getElementById('modal-rank').style.color = getTierColor(tier);
            document.getElementById('modal-score').innerText = `Calculated Score: ${score.toFixed(1)} / 10`;
            document.getElementById('modal-comment').innerText = meal.comment ? `"${meal.comment}"` : "No comment provided.";
            document.getElementById('mealModal').style.display = 'flex';
        }

        function getTierColor(tier) {
            const colors = { S: '#ff7f7f', A: '#ffbf7f', B: '#ffff7f', C: '#7fff7f', D: '#7fbfff', F: '#ff7fff' };
            return colors[tier] || '#fff';
        }

        function copyCode() {
            const text = document.getElementById('code-result').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied! Paste this into your meals.js file on GitHub.");
        }
    </script>
</body>
</html>
