<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Meal Tier Maker</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* TierMaker Container */
        #tier-container {
            width: 100%;
            max-width: 900px;
            background-color: #000;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        .tier-row {
            display: flex;
            min-height: 100px; /* Base height */
            border-bottom: 1px solid #222;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            min-width: 100px;
            font-weight: bold;
            font-size: 30px;
            color: #111;
        }

        /* Colors */
        .s { background: #ff7f7f; } .a { background: #ffbf7f; }
        .b { background: #ffff7f; } .c { background: #7fff7f; }
        .d { background: #7fbfff; } .f { background: #ff7fff; }

        /* This allows the row to grow vertically as images fill it */
        .content {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 10px;
            flex-grow: 1;
            gap: 10px;
        }

        .meal-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .meal-img:hover { border-color: white; transform: scale(1.05); }

        /* Form Styling */
        #entry-form {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea, button {
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        button { background: #ff7f7f; color: black; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #ff9f9f; }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #ff7f7f;
        }

        #modal-image { width: 100%; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S"><div class="label s">S</div><div class="content"></div></div>
        <div class="tier-row" id="A"><div class="label a">A</div><div class="content"></div></div>
        <div class="tier-row" id="B"><div class="label b">B</div><div class="content"></div></div>
        <div class="tier-row" id="C"><div class="label c">C</div><div class="content"></div></div>
        <div class="tier-row" id="D"><div class="label d">D</div><div class="content"></div></div>
        <div class="tier-row" id="F"><div class="label f">F</div><div class="content"></div></div>
    </div>

    <h3>Add New Meal</h3>
    <form id="entry-form">
        <input type="text" id="food-name" placeholder="Food Name" required>
        <input type="url" id="food-url" placeholder="Image URL (Right click image -> Copy Image Address)" required>
        <div style="display:flex; gap: 5px;">
            <input type="number" id="t-score" placeholder="Taste (1-10)" min="1" max="10" required>
            <input type="number" id="tx-score" placeholder="Texture (1-10)" min="1" max="10" required>
            <input type="number" id="e-score" placeholder="Ease (1-10)" min="1" max="10" required>
        </div>
        <textarea id="food-comment" placeholder="Your thoughts..."></textarea>
        <button type="submit">Add to List</button>
    </form>

    <div id="detailModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-image" src="" alt="">
            <h2 id="modal-name"></h2>
            <p id="modal-rank" style="font-weight:bold; font-size: 20px;"></p>
            <p id="modal-score"></p>
            <p id="modal-comment" style="font-style: italic; color: #aaa;"></p>
            <button onclick="closeModal()" style="margin-top:10px;">Close</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('entry-form');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const meal = {
                name: document.getElementById('food-name').value,
                url: document.getElementById('food-url').value,
                taste: parseFloat(document.getElementById('t-score').value),
                texture: parseFloat(document.getElementById('tx-score').value),
                ease: parseFloat(document.getElementById('e-score').value),
                comment: document.getElementById('food-comment').value
            };

            addMealToTier(meal);
            form.reset();
        });

        function addMealToTier(meal) {
            const finalScore = (meal.taste * 2 + meal.texture + meal.ease) / 4;
            let tier = 'F';
            if (finalScore >= 9) tier = 'S';
            else if (finalScore >= 7.5) tier = 'A';
            else if (finalScore >= 6) tier = 'B';
            else if (finalScore >= 4.5) tier = 'C';
            else if (finalScore >= 3) tier = 'D';

            const container = document.getElementById(tier).querySelector('.content');
            
            const img = document.createElement('img');
            img.src = meal.url;
            img.className = 'meal-img';
            img.onclick = () => openModal(meal, tier, finalScore);
            
            container.appendChild(img);
        }

        function openModal(meal, tier, score) {
            document.getElementById('modal-image').src = meal.url;
            document.getElementById('modal-name').innerText = meal.name;
            document.getElementById('modal-rank').innerText = `Rank: ${tier}`;
            document.getElementById('modal-rank').style.color = getTierColor(tier);
            document.getElementById('modal-score').innerText = `Score: ${score.toFixed(1)} / 10`;
            document.getElementById('modal-comment').innerText = `"${meal.comment}"`;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function getTierColor(tier) {
            const colors = { S: '#ff7f7f', A: '#ffbf7f', B: '#ffff7f', C: '#7fff7f', D: '#7fbfff', F: '#ff7fff' };
            return colors[tier];
        }
    </script>
</body>
</html>
