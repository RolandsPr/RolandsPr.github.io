<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Shared Meal Tier List</title>
    <style>
        /* TIERMAKER STYLING */
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #tier-container { width: 100%; max-width: 900px; background: #000; border: 1px solid #333; margin-bottom: 30px; }
        .tier-row { display: flex; min-height: 100px; border-bottom: 1px solid #111; }
        .label { width: 100px; min-width: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 32px; color: #111; }
        .s { background: #ff7f7f; } .a { background: #ffbf7f; } .b { background: #ffff7f; }
        .c { background: #7fff7f; } .d { background: #7fbfff; } .f { background: #ff7fff; }
        .content { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; flex-grow: 1; }
        .meal-img { width: 80px; height: 80px; object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: 0.1s; }
        .meal-img:hover { border-color: white; transform: scale(1.1); }
        
        /* FORM STYLING */
        .admin-panel { background: #252525; padding: 25px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #444; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { background: #ff7f7f; color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; border: 1px solid #333; }
        #modal-image { width: 100%; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S"><div class="label s">S</div><div class="content"></div></div>
        <div class="tier-row" id="A"><div class="label a">A</div><div class="content"></div></div>
        <div class="tier-row" id="B"><div class="label b">B</div><div class="content"></div></div>
        <div class="tier-row" id="C"><div class="label c">C</div><div class="content"></div></div>
        <div class="tier-row" id="D"><div class="label d">D</div><div class="content"></div></div>
        <div class="tier-row" id="F"><div class="label f">F</div><div class="content"></div></div>
    </div>

    <div class="admin-panel">
        <h3>Add New Meal</h3>
        <form id="meal-form">
            <input type="text" id="food-name" placeholder="Food Name" required>
            
            <p style="font-size: 12px; margin: 15px 0 5px 0; color: #888;">Select Photo:</p>
            <input type="file" id="food-file" accept="image/*" required>

            <div style="display:flex; gap:5px;">
                <input type="number" id="taste" placeholder="Taste (1-10)" min="1" max="10" required>
                <input type="number" id="texture" placeholder="Texture" min="1" max="10" required>
                <input type="number" id="ease" placeholder="Ease" min="1" max="10" required>
            </div>
            <textarea id="comment" placeholder="Any thoughts?"></textarea>
            <button type="submit" id="save-btn">Upload & Save</button>
        </form>
    </div>

<div id="detailModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="view-mode">
            <img id="modal-image" src="">
            <h2 id="modal-name"></h2>
            <p id="modal-score" style="font-weight:bold;"></p>
            <p id="modal-comment" style="font-style:italic; background:#222; padding:10px; border-radius:5px;"></p>
            
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            
            <div style="text-align:left;">
                <h4 style="margin-bottom:10px;">Discussion</h4>
                <div id="comment-list" style="max-height: 150px; overflow-y: auto; background: #111; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 10px;">
                    </div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="new-comment" placeholder="Add a comment..." style="margin-top:0; flex-grow:1;">
                    <button onclick="postComment()" style="margin-top:0; width:auto; padding:5px 15px;">Post</button>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="toggleEdit(true)" style="background:#ffbf7f; color:black;">Edit Entry</button>
                <button id="delete-btn" style="background:#ff4444; color:white;">Delete</button>
            </div>
        </div>

        <div id="edit-mode" style="display:none;">
            <h3>Edit Meal</h3>
            <input type="text" id="edit-name">
            <div style="display:flex; gap:5px;">
                <input type="number" id="edit-t" placeholder="T" min="1" max="10">
                <input type="number" id="edit-tx" placeholder="Tx" min="1" max="10">
                <input type="number" id="edit-e" placeholder="E" min="1" max="10">
            </div>
            <textarea id="edit-comm"></textarea>
            <button onclick="saveEdit()" style="background:#7fff7f; color:black;">Save Changes</button>
            <button onclick="toggleEdit(false)" style="background:none; border:none; text-decoration:underline;">Cancel</button>
        </div>
    </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        // 1. YOUR CONFIGS
        const firebaseConfig = {
            apiKey: "AIzaSyD2GB1z8EtrLOab0qT_yUgkyKkGrGRTD3Y",
            authDomain: "food-tier-list-faa87.firebaseapp.com",
            databaseURL: "https://food-tier-list-faa87-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "food-tier-list-faa87",
            storageBucket: "food-tier-list-faa87.firebasestorage.app",
            messagingSenderId: "14181086909",
            appId: "1:14181086909:web:36deb605a6ef77c64069d4",
            measurementId: "G-JCGXWM0VB5"
        };
        const IMGBB_API_KEY = "d0585a9282e603bcf0ecbdf5beca45a5";

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('meals');

        // 2. LISTEN FOR DATA
        db.on('value', (snapshot) => {
            document.querySelectorAll('.content').forEach(c => c.innerHTML = '');
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => renderMeal(data[id], id));
            }
        });

        // 3. THE UPLOAD LOGIC
        document.getElementById('meal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const file = document.getElementById('food-file').files[0];
            
            btn.disabled = true;
            btn.innerText = "Uploading Image...";

            try {
                // Upload to ImgBB
                const formData = new FormData();
                formData.append('image', file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (!result.success) throw new Error("Upload failed");

                // Save to Firebase
                const meal = {
                    name: document.getElementById('food-name').value,
                    url: result.data.url,
                    taste: parseFloat(document.getElementById('taste').value),
                    texture: parseFloat(document.getElementById('texture').value),
                    ease: parseFloat(document.getElementById('ease').value),
                    comment: document.getElementById('comment').value
                };

                await db.push(meal);
                e.target.reset();
                alert("Meal Added!");

            } catch (err) {
                console.error(err);
                alert("Something went wrong. Check your API key!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload & Save";
            }
        });

        function renderMeal(meal, id) {
            const avg = (meal.taste * 2 + meal.texture + meal.ease) / 4;
            const tier = avg >= 9 ? 'S' : avg >= 7.5 ? 'A' : avg >= 6 ? 'B' : avg >= 4.5 ? 'C' : avg >= 3 ? 'D' : 'F';
            
            const container = document.getElementById(tier).querySelector('.content');
            const img = document.createElement('img');
            img.src = meal.url;
            img.className = 'meal-img';
            img.onclick = () => {
                document.getElementById('modal-image').src = meal.url;
                document.getElementById('modal-name').innerText = meal.name;
                document.getElementById('modal-score').innerText = `Tier: ${tier} (${avg.toFixed(1)}/10)`;
                document.getElementById('modal-comment').innerText = meal.comment || "No comment.";
                document.getElementById('delete-btn').onclick = () => {
                    if(confirm("Delete this?")) {
                        db.child(id).remove();
                        document.getElementById('detailModal').style.display = 'none';
                    }
                };
                document.getElementById('detailModal').style.display = 'flex';
            };
            container.appendChild(img);
        }
        let currentMealId = null;

function closeModal() {
    document.getElementById('detailModal').style.display = 'none';
    toggleEdit(false); // Always reset to view mode when closing
}

function toggleEdit(isEditing) {
    document.getElementById('view-mode').style.display = isEditing ? 'none' : 'block';
    document.getElementById('edit-mode').style.display = isEditing ? 'block' : 'none';
}

// UPDATE RENDERMEAL: Ensure it passes the whole meal object
function renderMeal(meal, id) {
    const avg = (meal.taste * 2 + meal.texture + meal.ease) / 4;
    const tier = avg >= 9 ? 'S' : avg >= 7.5 ? 'A' : avg >= 6 ? 'B' : avg >= 4.5 ? 'C' : avg >= 3 ? 'D' : 'F';
    
    const container = document.getElementById(tier).querySelector('.content');
    const img = document.createElement('img');
    img.src = meal.url;
    img.className = 'meal-img';
    img.onclick = () => openMealDetails(meal, id, tier, avg);
    container.appendChild(img);
}

function openMealDetails(meal, id, tier, avg) {
    currentMealId = id;
    
    // Fill View Mode
    document.getElementById('modal-image').src = meal.url;
    document.getElementById('modal-name').innerText = meal.name;
    document.getElementById('modal-score').innerText = `${tier} Tier (${avg.toFixed(1)}/10)`;
    document.getElementById('modal-comment').innerText = meal.comment || "No review yet.";
    
    // Fill Edit Mode inputs
    document.getElementById('edit-name').value = meal.name;
    document.getElementById('edit-t').value = meal.taste;
    document.getElementById('edit-tx').value = meal.texture;
    document.getElementById('edit-e').value = meal.ease;
    document.getElementById('edit-comm').value = meal.comment || "";

    // Load Comments
    loadComments(id);

    document.getElementById('detailModal').style.display = 'flex';
}

// SAVE EDITS
async function saveEdit() {
    const updatedMeal = {
        name: document.getElementById('edit-name').value,
        taste: parseFloat(document.getElementById('edit-t').value),
        texture: parseFloat(document.getElementById('edit-tx').value),
        ease: parseFloat(document.getElementById('edit-e').value),
        comment: document.getElementById('edit-comm').value
    };
    
    // We use .update() so we don't overwrite the image 'url' or 'comments'
    await db.child(currentMealId).update(updatedMeal);
    toggleEdit(false);
}

// COMMENT LOGIC
function postComment() {
    const text = document.getElementById('new-comment').value;
    if(!text) return;

    const commentData = {
        text: text,
        timestamp: Date.now()
    };

    db.child(currentMealId).child('comments').push(commentData);
    document.getElementById('new-comment').value = "";
}

function loadComments(mealId) {
    const list = document.getElementById('comment-list');
    list.innerHTML = "Loading discussion...";

    db.child(mealId).child('comments').on('value', (snap) => {
        list.innerHTML = "";
        const comments = snap.val();
        if(!comments) {
            list.innerHTML = "<span style='color:#555'>No comments yet. Be the first!</span>";
            return;
        }
        Object.values(comments).forEach(c => {
            const div = document.createElement('div');
            div.style.marginBottom = "8px";
            div.innerHTML = `<b style="color:#ff7f7f;">Anon:</b> ${c.text}`;
            list.appendChild(div);
        });
        list.scrollTop = list.scrollHeight; // Scroll to bottom
    });
}
    </script>
</body>
</html>
