<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meal Tier List</title>
    <style>
        /* TIERMAKER DESIGN SYSTEM */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        #tier-container {
            width: 100%;
            max-width: 950px;
            background-color: #000;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .tier-row {
            display: flex;
            min-height: 100px;
            border-bottom: 1px solid #111;
        }

        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            min-width: 100px;
            font-weight: bold;
            font-size: 32px;
            color: #111;
        }

        /* Tier Colors */
        .s { background: #ff7f7f; } .a { background: #ffbf7f; }
        .b { background: #ffff7f; } .c { background: #7fff7f; }
        .d { background: #7fbfff; } .f { background: #ff7fff; }

        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            flex-grow: 1;
            gap: 10px;
            align-content: flex-start;
        }

        .meal-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.15s ease-in-out;
            background: #222;
        }

        .meal-img:hover { border-color: white; transform: scale(1.1); z-index: 5; }

        /* ADMIN PANEL */
        .admin-panel {
            background: #252525;
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #444;
            margin-bottom: 50px;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button { background: #ff7f7f; color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ffbf7f; transform: translateY(-2px); }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #333;
        }

        #modal-image { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .del-btn { background: #ff4444; color: white; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Meal Tier List</h1>

    <div id="tier-container">
        <div class="tier-row" id="S"><div class="label s">S</div><div class="content"></div></div>
        <div class="tier-row" id="A"><div class="label a">A</div><div class="content"></div></div>
        <div class="tier-row" id="B"><div class="label b">B</div><div class="content"></div></div>
        <div class="tier-row" id="C"><div class="label c">C</div><div class="content"></div></div>
        <div class="tier-row" id="D"><div class="label d">D</div><div class="content"></div></div>
        <div class="tier-row" id="F"><div class="label f">F</div><div class="content"></div></div>
    </div>

    <div class="admin-panel">
        <h3>Add New Entry</h3>
        <p style="font-size: 12px; color: #888; margin-top: -10px;">Data syncs live via Firebase</p>
        <form id="meal-form">
            <input type="text" id="food-name" placeholder="Food Name" required>
            <input type="text" id="food-url" placeholder="Image Path (e.g., images/burger.jpg)" required>
            <div style="display:flex; gap:5px;">
                <input type="number" id="t-score" placeholder="Taste" min="1" max="10" required title="Taste (1-10)">
                <input type="number" id="tx-score" placeholder="Texture" min="1" max="10" required title="Texture (1-10)">
                <input type="number" id="e-score" placeholder="Ease" min="1" max="10" required title="Ease (1-10)">
            </div>
            <textarea id="food-comment" placeholder="Add your review..."></textarea>
            <button type="submit">Save to Cloud</button>
        </form>
    </div>

    <div id="detailModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-image" src="">
            <h2 id="modal-name" style="margin-bottom:5px;"></h2>
            <div id="modal-rank" style="font-size: 28px; font-weight: bold; margin-bottom: 10px;"></div>
            <p id="modal-score" style="color: #888; margin-bottom: 15px;"></p>
            <p id="modal-comment" style="font-style: italic; background:#222; padding:15px; border-radius:8px; line-height: 1.4;"></p>
            <button class="del-btn" id="delete-btn">Delete Entry for Everyone</button>
            <button onclick="document.getElementById('detailModal').style.display='none'" style="background:none; color:#555; font-size:12px; text-decoration:underline;">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 2. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
            apiKey: "PASTE_HERE",
            authDomain: "PASTE_HERE",
            databaseURL: "PASTE_HERE",
            projectId: "PASTE_HERE",
            storageBucket: "PASTE_HERE",
            messagingSenderId: "PASTE_HERE",
            appId: "PASTE_HERE"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('meals');

        // 3. LISTEN FOR UPDATES
        db.on('value', (snapshot) => {
            // Clear current tier list contents
            document.querySelectorAll('.content').forEach(c => c.innerHTML = '');
            
            const data = snapshot.val();
            if (data) {
                // Render every meal from the cloud
                Object.keys(data).forEach(mealId => {
                    renderMeal(data[mealId], mealId);
                });
            }
        });

        // 4. ADD NEW MEAL TO FIREBASE
        document.getElementById('meal-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const meal = {
                name: document.getElementById('food-name').value,
                url: document.getElementById('food-url').value,
                taste: parseFloat(document.getElementById('t-score').value),
                texture: parseFloat(document.getElementById('tx-score').value),
                ease: parseFloat(document.getElementById('e-score').value),
                comment: document.getElementById('food-comment').value
            };
            db.push(meal); // Push to the cloud database
            e.target.reset();
        });

        // 5. RENDER LOGIC
        function renderMeal(meal, id) {
            const score = (meal.taste * 2 + meal.texture + meal.ease) / 4;
            let tier = 'F';
            if (score >= 9) tier = 'S';
            else if (score >= 7.5) tier = 'A';
            else if (score >= 6) tier = 'B';
            else if (score >= 4.5) tier = 'C';
            else if (score >= 3) tier = 'D';

            const container = document.getElementById(tier).querySelector('.content');
            const img = document.createElement('img');
            img.src = meal.url;
            img.className = 'meal-img';
            img.onclick = () => openModal(meal, tier, score, id);
            container.appendChild(img);
        }

        // 6. POPUP/MODAL LOGIC
        function openModal(meal, tier, score, id) {
            document.getElementById('modal-image').src = meal.url;
            document.getElementById('modal-name').innerText = meal.name;
            document.getElementById('modal-rank').innerText = tier + " RANK";
            document.getElementById('modal-rank').style.color = getTierColor(tier);
            document.getElementById('modal-score').innerText = `Final Score: ${score.toFixed(1)} / 10`;
            document.getElementById('modal-comment').innerText = meal.comment ? `"${meal.comment}"` : "No comment.";
            
            document.getElementById('delete-btn').onclick = () => {
                if(confirm("Are you sure you want to delete this meal for everyone?")) {
                    firebase.database().ref('meals/' + id).remove();
                    document.getElementById('detailModal').style.display = 'none';
                }
            };
            document.getElementById('detailModal').style.display = 'flex';
        }

        function getTierColor(tier) {
            const colors = { S: '#ff7f7f', A: '#ffbf7f', B: '#ffff7f', C: '#7fff7f', D: '#7fbfff', F: '#ff7fff' };
            return colors[tier] || '#fff';
        }
    </script>
</body>
</html>
