<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Personal Meal Tier List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>The Ultimate Meal Tier List</h1>
    
    <div id="tier-container">
        <div class="tier-row" id="S-tier">
            <div class="label" style="background: #ff7f7f;">S</div>
            <div class="content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <div class="tier-row" id="A-tier">
            <div class="label" style="background: #ffbf7f;">A</div>
            <div class="content" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        </div>

    <div id="foodModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Food Name</h2>
            <img id="modalImg" src="" alt="Food Image">
            <p id="modalScore"></p>
            <p id="modalComment"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
